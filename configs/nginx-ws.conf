# SVENOM WebSocket Relay — tambahkan ke server block domain yang sudah ada
# Contoh: /etc/nginx/sites-enabled/shopinmy.com
#
# Copy location block di bawah ini ke dalam server { ... } block nginx kamu.
# Lalu jalankan: sudo nginx -t && sudo nginx -s reload

    location /ws {
        proxy_pass http://127.0.0.1:9443;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Timeout tinggi untuk koneksi long-lived (24 jam)
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;

        # Matikan buffering untuk real-time data
        proxy_buffering off;
    }
